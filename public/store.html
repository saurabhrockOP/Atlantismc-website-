<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AtlantisMC Store | Secure Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-rack"></div>
    <div id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background: linear-gradient(180deg, #020617 0%, #0f172a 100%);"></div>

    <header class="main-wrapper" style="padding-bottom: 0;">
        <a href="index.html" style="color: #00d2ff; text-decoration: none; font-size: 0.95rem; font-weight: bold; margin-bottom: 15px; display: inline-block;">← Return to Main Hub</a>
        <h1 class="neon-text">Secure Webstore</h1>
    </header>

    <main class="main-wrapper">
        <!-- Ranks -->
        <h2 style="font-size: 1.5rem; color: #f59e0b; width: 100%; border-bottom: 2px solid #1e293b; padding-bottom: 10px; margin-bottom: 20px;">👑 Premium Ranks</h2>
        <div class="btn-grid" style="margin-top: 0; max-width: 100%;">
            <div class="glass-panel store-item">
                <h3>Olympian Rank</h3>
                <p class="store-price">₹250</p>
                <button type="button" class="btn btn-primary" onclick="window.triggerPurchase('Olympian Rank', 250)">Acquire Rank</button>
            </div>
            <div class="glass-panel store-item" style="border-color: #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); transform: scale(1.02);">
                <p style="color: #f59e0b; font-size: 0.8rem; font-weight: 900; letter-spacing: 0.05em; margin-bottom: 5px; text-transform: uppercase;">⭐ Best Value</p>
                <h3>Titan Rank</h3>
                <p class="store-price">₹80</p>
                <button type="button" class="btn" style="background: linear-gradient(135deg, #f59e0b, #d97706);" onclick="window.triggerPurchase('Titan Rank', 80)">Acquire Rank</button>
            </div>
        </div>

        <!-- Keys -->
        <h2 style="font-size: 1.5rem; color: #00d2ff; width: 100%; border-bottom: 2px solid #1e293b; padding-bottom: 10px; margin: 40px 0 20px 0;">🗝️ Crate Keys</h2>
        <div class="btn-grid" style="margin-top: 0; max-width: 100%;">
            <div class="glass-panel store-item">
                <h3>Prime Crate Key</h3>
                <p class="store-price">₹50</p>
                <div class="qty-box"><label style="font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 5px;">Quantity:</label><input type="number" id="q-prime" value="1" min="1"></div>
                <button type="button" class="btn btn-dark" onclick="window.triggerKeyPurchase('Prime Crate Key', 50, 'q-prime')">Purchase Keys</button>
            </div>
            <div class="glass-panel store-item">
                <h3>Amethyst Crate Key</h3>
                <p class="store-price">₹25</p>
                <div class="qty-box"><label style="font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 5px;">Quantity:</label><input type="number" id="q-amethyst" value="1" min="1"></div>
                <button type="button" class="btn btn-dark" onclick="window.triggerKeyPurchase('Amethyst Crate Key', 25, 'q-amethyst')">Purchase Keys</button>
            </div>
        </div>
    </main>

    <!-- UNBREAKABLE SECURE MODAL -->
    <div id="secureModal" class="modal-wrapper">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Secure Checkout</h2>
                <span class="close-btn" onclick="window.closeModal()">&times;</span>
            </div>
            
            <form id="checkoutForm">
                <div class="input-group">
                    <label>Selected Package</label>
                    <input type="text" id="m-item" class="pro-input" style="color: #94a3b8; cursor: not-allowed;" readonly>
                </div>
                <div class="input-group">
                    <label>Total Payment Due</label>
                    <input type="text" id="m-price" class="pro-input" style="color: #10b981; font-weight: 900; font-size: 1.2rem; cursor: not-allowed;" readonly>
                </div>
                
                <div id="step-1">
                    <div class="input-group">
                        <label>Minecraft Username *</label>
                        <input type="text" id="m-ign" class="pro-input" placeholder="Exact In-Game Name" required>
                    </div>
                    <div class="input-group">
                        <label>Discord ID *</label>
                        <input type="text" id="m-discord" class="pro-input" placeholder="e.g., player#1234" required>
                    </div>
                    <button type="button" class="btn btn-primary" style="margin-top: 25px;" onclick="window.showStep2()">Proceed to Fampay</button>
                </div>

                <div id="step-2" style="display: none;">
                    <div class="utr-highlight">
                        <p style="color: #f59e0b; font-weight: 900; margin-bottom: 10px;">1. Scan to Transfer Funds</p>
                        <img src="1000300514.jpg" class="qr-render" alt="Fampay QR">
                        
                        <p style="color: #00d2ff; font-weight: 900; margin: 20px 0 10px 0;">2. Enter 12-Digit UTR Number</p>
                        <input type="text" id="m-utr" class="pro-input" placeholder="e.g. 123456789012" maxlength="12" pattern="\\d{12}" style="border-color: #f59e0b; text-align: center; font-weight: bold; letter-spacing: 2px;">
                    </div>
                    <button type="submit" id="finalBtn" class="btn btn-success" style="margin-top: 15px;">Verify UTR & Claim Items</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Global Toast System
        window.fireToast = function(msg, type) {
            const rack = document.getElementById("toast-rack");
            const t = document.createElement("div");
            t.className = `toast-msg toast-${type}`;
            t.innerHTML = type === 'success' ? `✅ ${msg}` : `⚠️ ${msg}`;
            rack.appendChild(t);
            setTimeout(() => t.classList.add("show"), 10);
            setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 400); }, 3500);
        };

        // State Management
        let cartItem = ""; 
        let cartPrice = 0;
        const modal = document.getElementById('secureModal');

        // Logic mapped securely to window object to prevent mobile browser scoping issues
        window.triggerPurchase = function(name, cost) {
            cartItem = name; cartPrice = cost;
            document.getElementById('m-item').value = cartItem;
            document.getElementById('m-price').value = "₹" + cartPrice;
            modal.classList.add('is-open');
        };

        window.triggerKeyPurchase = function(name, unitCost, inputId) {
            const qty = parseInt(document.getElementById(inputId).value) || 1;
            window.triggerPurchase(`${qty}x ${name}`, unitCost * qty);
        };

        window.closeModal = function() {
            modal.classList.remove('is-open');
            setTimeout(() => {
                document.getElementById('step-1').style.display = 'block';
                document.getElementById('step-2').style.display = 'none';
                document.getElementById('m-utr').removeAttribute('required');
                document.getElementById('checkoutForm').reset();
            }, 300);
        };

        window.showStep2 = function() {
            if(!document.getElementById('m-ign').value || !document.getElementById('m-discord').value) {
                window.fireToast("Username and Discord ID are required.", "error"); return;
            }
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            document.getElementById('m-utr').setAttribute('required', 'true');
        };

        // Backend Pipeline Integration
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const utr = document.getElementById('m-utr').value;
            if(utr.length !== 12) { window.fireToast("UTR must be exactly 12 digits.", "error"); return; }

            const payload = {
                username: document.getElementById('m-ign').value,
                discord: document.getElementById('m-discord').value,
                utr: utr,
                item: cartItem, price: cartPrice
            };
            
            const btn = document.getElementById('finalBtn');
            btn.innerText = "Connecting to Secure Node...";
            btn.style.opacity = "0.7";

            fetch('/api/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
            .then(r => r.json()).then(data => {
                if(data.success) { 
                    window.fireToast("Secured! Staff will verify the UTR.", "success"); 
                    setTimeout(window.closeModal, 2000); 
                } else { window.fireToast(data.message, "error"); }
            }).catch(() => window.fireToast("Network Error.", "error"))
            .finally(() => { btn.innerText = "Verify UTR & Claim Items"; btn.style.opacity = "1"; });
        });
    </script>
</body>
</html>
