<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtlantisMC Network | Hub</title>
    <link rel="icon" href="nav-logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-rack"></div>
    <canvas id="particleCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>

    <div class="main-wrapper">
        <header style="text-align: center; padding: 40px 20px;">
            <img src="logo.png" alt="AtlantisMC Logo" class="hero-logo" style="max-width: 180px; height: auto;">
            <h1 class="neon-text" style="font-size: 2.5rem; margin-top: 20px;">AtlantisMC Network</h1>
            <p style="color: #94a3b8; font-size: 1.1rem; margin-top: 10px;">India's Ultimate Lifesteal SMP Environment</p>
            
            <div class="glass-panel" onclick="copyIP()" style="margin: 30px auto; max-width: 450px; padding: 20px; cursor: pointer; border-radius: 12px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(0, 210, 255, 0.2);">
                <p style="font-size: 1.25rem; font-weight: bold; color: #fff; margin: 0;">play.atlantismc.fun</p>
                <p style="font-size: 0.85rem; color: #00d2ff; margin: 5px 0 0 0;">✨ Click to Copy IP Connection</p>
                <p style="font-size: 0.9rem; margin-top: 10px; color: #94a3b8;">Active Network Allocation: <span id="playerSlots" style="font-weight: bold; color: #10b981;">Syncing Matrix...</span></p>
            </div>
        </header>

        <main class="btn-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto; padding: 0 20px;">
            <a href="/store" class="btn btn-primary" style="padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; display: block;">🛒 Premium Webstore</a>
            <a href="https://discord.gg/yUP4npQADB" target="_blank" class="btn btn-discord" style="padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; display: block;">💬 Community Discord</a>
            <a href="/rules" class="btn btn-dark" style="padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; display: block;">📜 Network Regulations</a>
            <a href="https://topg.org/minecraft-servers/server-679412" target="_blank" class="btn btn-success" style="padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; display: block;">👍 Vote for Rewards</a>
        </main>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.atlantismc.fun").then(() => {
                const rack = document.getElementById("toast-rack");
                const toast = document.createElement("div");
                toast.style.cssText = "position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 6px; font-weight: bold; z-index: 99999;";
                toast.innerHTML = `✅ Network IP Copied!`;
                rack.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            });
        }

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        for (let i = 0; i < 40; i++) {
            particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2 + 1, dy: (Math.random() * -1) - 0.2, op: Math.random() * 0.4 + 0.1 });
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.dy; if (p.y < -10) p.y = canvas.height + 10;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 210, 255, ${p.op})`; ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        async function fetchPlayerCount() {
            const slotsElement = document.getElementById('playerSlots');
            try {
                let response = await fetch('https://api.mcsrvstat.us/3/play.atlantismc.fun');
                let data = await response.json();
                if (data.online) { slotsElement.innerText = data.players.online + " / " + data.players.max; }
                else { slotsElement.innerText = "Offline Pool"; }
            } catch (error) { slotsElement.innerText = "Timeout Error"; }
        }
        fetchPlayerCount(); setInterval(fetchPlayerCount, 45000);
    </script>
</body>
</html>
